<svg width="860" height="280" viewBox="0 0 860 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Animated gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a">
        <animate attributeName="stop-color" values="#0d0d1a;#0a0a2e;#0d0d1a" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#0f0f2e">
        <animate attributeName="stop-color" values="#0f0f2e;#1a0a2e;#0f0f2e" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0d1a2e">
        <animate attributeName="stop-color" values="#0d1a2e;#0d0d1a;#0d1a2e" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow gradients -->
    <radialGradient id="glow1" cx="20%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="60%" r="35%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="10%" r="30%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>

    <!-- Text gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8">
        <animate attributeName="stop-color" values="#818cf8;#a78bfa;#38bdf8;#818cf8" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#a78bfa">
        <animate attributeName="stop-color" values="#a78bfa;#38bdf8;#818cf8;#a78bfa" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#38bdf8">
        <animate attributeName="stop-color" values="#38bdf8;#818cf8;#a78bfa;#38bdf8" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Tag gradient -->
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.3"/>
    </linearGradient>

    <filter id="blur1">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="gTextGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="280" rx="18" fill="url(#bgGrad)"/>
  <rect width="860" height="280" rx="18" fill="url(#glow1)"/>
  <rect width="860" height="280" rx="18" fill="url(#glow2)"/>
  <rect width="860" height="280" rx="18" fill="url(#glow3)"/>

  <!-- Animated floating orbs -->
  <circle cx="80" cy="220" r="55" fill="#6366f1" opacity="0.07" filter="url(#blur1)">
    <animate attributeName="cy" values="220;190;220" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.07;0.13;0.07" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="760" cy="70" r="65" fill="#a855f7" opacity="0.08" filter="url(#blur1)">
    <animate attributeName="cy" values="70;100;70" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.14;0.08" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="430" cy="250" r="45" fill="#06b6d4" opacity="0.06" filter="url(#blur1)">
    <animate attributeName="cy" values="250;230;250" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="180" r="30" fill="#818cf8" opacity="0.09" filter="url(#blur2)">
    <animate attributeName="cx" values="680;700;680" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Decorative grid lines (subtle) -->
  <line x1="0" y1="140" x2="860" y2="140" stroke="#6366f1" stroke-width="0.3" opacity="0.12"/>
  <line x1="430" y1="0" x2="430" y2="280" stroke="#a855f7" stroke-width="0.3" opacity="0.10"/>

  <!-- Top border glow -->
  <rect x="0" y="0" width="860" height="3" rx="3" fill="url(#nameGrad)" opacity="0.9"/>

  <!-- Floating particles -->
  <circle cx="150" cy="50" r="2" fill="#818cf8" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="50;40;50" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="230" r="1.5" fill="#a78bfa" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="230;220;230" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="40" r="2" fill="#38bdf8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="250" r="1.5" fill="#6366f1" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="130" r="1.5" fill="#a855f7" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="130;120;130" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="140" r="2" fill="#06b6d4" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Bracket decoration -->
  <text x="36" y="115" font-family="Fira Code, monospace" font-size="52" fill="#6366f1" opacity="0.18" font-weight="bold">{</text>
  <text x="800" y="175" font-family="Fira Code, monospace" font-size="52" fill="#a855f7" opacity="0.15" font-weight="bold">}</text>

  <!-- Eyebrow label -->
  <rect x="36" y="36" width="200" height="24" rx="12" fill="url(#tagGrad)" stroke="#6366f1" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="136" y="53" font-family="Fira Code, monospace" font-size="11" fill="#a5b4fc" text-anchor="middle" letter-spacing="2">// ZikZik Studio · ECE · IoT</text>

  <!-- Main Name -->
  <text x="430" y="128" font-family="Fira Code, monospace" font-size="48" font-weight="bold"
    fill="url(#nameGrad)" text-anchor="middle" filter="url(#gTextGlow)" letter-spacing="-1">
    Mohammed Razik
  </text>

  <!-- Animated underline -->
  <rect x="130" y="138" height="2.5" rx="2" fill="url(#nameGrad)" opacity="0.8">
    <animate attributeName="width" values="0;600;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x" values="430;130;430" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Role tags row -->
  <!-- Tag 1 -->
  <rect x="60" y="160" width="148" height="26" rx="13" fill="#6366f1" fill-opacity="0.18" stroke="#6366f1" stroke-width="0.8" stroke-opacity="0.7"/>
  <text x="134" y="177" font-family="Fira Code, monospace" font-size="11" fill="#a5b4fc" text-anchor="middle">⚡ Full-Stack Dev</text>

  <!-- Tag 2 -->
  <rect x="220" y="160" width="118" height="26" rx="13" fill="#a855f7" fill-opacity="0.18" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.7"/>
  <text x="279" y="177" font-family="Fira Code, monospace" font-size="11" fill="#d8b4fe" text-anchor="middle">🤖 AI Builder</text>

  <!-- Tag 3 -->
  <rect x="350" y="160" width="108" height="26" rx="13" fill="#06b6d4" fill-opacity="0.18" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.7"/>
  <text x="404" y="177" font-family="Fira Code, monospace" font-size="11" fill="#67e8f9" text-anchor="middle">📡 IoT Hacker</text>

  <!-- Tag 4 -->
  <rect x="470" y="160" width="118" height="26" rx="13" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="529" y="177" font-family="Fira Code, monospace" font-size="11" fill="#fcd34d" text-anchor="middle">🏗️ ECE Student</text>

  <!-- Tag 5 -->
  <rect x="600" y="160" width="140" height="26" rx="13" fill="#ec4899" fill-opacity="0.15" stroke="#ec4899" stroke-width="0.8" stroke-opacity="0.6"/>
  <text x="670" y="177" font-family="Fira Code, monospace" font-size="11" fill="#f9a8d4" text-anchor="middle">🍎 iOS Explorer</text>

  <!-- Tagline -->
  <text x="430" y="225" font-family="Fira Code, monospace" font-size="13.5" fill="#64748b" text-anchor="middle" letter-spacing="0.5">
    Building the web · Soldering circuits · Shipping products
  </text>

  <!-- Location pill -->
  <rect x="330" y="242" width="200" height="22" rx="11" fill="#1e293b" fill-opacity="0.7"/>
  <text x="430" y="257" font-family="Fira Code, monospace" font-size="10.5" fill="#94a3b8" text-anchor="middle">📍 Chennai, Tamil Nadu, India</text>
</svg>
